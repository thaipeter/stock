<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คลังอะไหล่เมาท์เทน</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">

    <!-- Project CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    <link rel="stylesheet" href="./css/responsive.css">

    <!-- Third-party JS Libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="dark-mode">

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="loginScreen" class="login-overlay" style="display: none;">
        <div class="login-card">
            <div class="mb-4">
                <img src="" alt="Logo" class="sys-logo-display mx-auto" style="max-width:90px; border-radius: 16px; box-shadow: var(--shadow-md); margin-bottom: 20px; display:none;">
                <i class="fas fa-layer-group text-theme sys-icon-display" style="font-size: 3.5rem; margin-bottom: 15px;"></i>
                <h3 class="fw-bold text-dark sys-name-display mt-2">คลังอะไหล่เมาท์เทน</h3>
                <p class="text-muted small fw-medium mt-1">Smart Inventory Workspace</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <select class="form-select form-select-lg mb-3 text-center fw-bold" id="loginUid" required>
                        <option value="">-- กำลังโหลดรายชื่อ... --</option>
                    </select>
                    <input type="password" class="form-control form-control-lg text-center fw-bold" id="loginPin" placeholder="PIN CODE" required>
                </div>
                <div class="text-muted small mb-4 bg-light p-2 rounded-3 border">รหัสผ่านสำหรับเริ่มต้นคือ: <b class="text-dark">1234</b></div>
                <button type="submit" class="btn btn-theme btn-lg w-100 fw-bold py-3 rounded-3">เข้าสู่ระบบ</button>
            </form>
            <div class="mt-3 text-danger small fw-bold d-none p-2 bg-danger bg-opacity-10 rounded" id="loginError">
                <i class="fas fa-exclamation-circle"></i> รหัสผ่านไม่ถูกต้อง!
            </div>
            <div class="mt-4 text-muted small border-top pt-4" id="adminContactDisplay">
                <i class="fas fa-shield-alt"></i> ระบบความปลอดภัยระดับองค์กร
            </div>
        </div>
    </div>

    <!-- ==================== LOADING OVERLAY ==================== -->
    <div id="loading" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-theme mb-3" style="width: 3.5rem; height: 3.5rem; border-width: 4px;" role="status"></div>
        <h5 class="text-secondary fw-bold mt-2">กำลังทำงาน...</h5>
    </div>

    <!-- ==================== MODALS ==================== -->
    <div id="modals-container"></div>

    <!-- ==================== SCANNER PANEL ==================== -->
    <div id="scanner-panel-container"></div>

    <!-- hidden QR reader div -->
    <div id="reader" style="display:none;position:absolute;pointer-events:none;"></div>

    <!-- ==================== MAIN LAYOUT ==================== -->
    <div class="wrapper">
        <nav id="sidebar" style="display:none!important"></nav>
        <div id="content">

            <!-- Top Navigation (injected from component) -->
            <div id="navbar-container"></div>

            <!-- Page Content -->
            <div class="page-content bg-light">
                <div id="dashboard"           class="section-view active"></div>
                <div id="transactionsInOut"    class="section-view"></div>
                <div id="borrowedItems"        class="section-view"></div>
                <div id="monthlyOrders"        class="section-view"></div>
                <div id="items"                class="section-view"></div>
                <div id="tools"                class="section-view"></div>
                <div id="qrManagement"         class="section-view"></div>
                <div id="history"              class="section-view"></div>
                <div id="settings"             class="section-view"></div>
            </div>

        </div>
    </div>

    <!-- ==================== PROJECT JS ==================== -->
    <script src="./js/api.js"></script>
    <script src="./js/chart.js"></script>
    <script src="./js/app.js"></script>

</body>
</html>
